<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Galeria de Fotos - GEPHECL | UFAL CEDU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body data-page="fotos">
  <header class="site-header">
    <div>
      <h1>gephecl</h1>
    </div>
  </header>

  <nav class="nav-wrap" data-component="navbar"></nav>

  <main class="main-wrap">
    <section class="page-top reveal-on-scroll">
      <h1 class="page-title">Galeria de Fotos</h1>
      <p class="breadcrumb"><a href="index.html">Home</a> / Galeria de Fotos</p>
    </section>
    <div class="conteudo reveal-on-scroll">
      <div class="gallery-view-switch" data-gallery-view-switch>
        <button type="button" class="gallery-view-btn is-active" data-gallery-view="grid" title="Itens pequenos" aria-label="Itens pequenos">
          <span aria-hidden="true">▦</span>
        </button>
        <button type="button" class="gallery-view-btn" data-gallery-view="slider" title="Slide" aria-label="Slide">
          <span aria-hidden="true">▭</span>
        </button>
      </div>
      <p class="galeria-status" data-galeria-status>Carregando fotos...</p>
      <div class="galeria" data-auto-gallery-grid></div>
      <div class="galeria-slider" data-auto-gallery-slider hidden>
        <button type="button" class="galeria-slider-nav" data-gallery-prev aria-label="Foto anterior">←</button>
        <figure class="galeria-slider-figure">
          <img src="" alt="" data-gallery-slider-image>
          <figcaption>
            <strong data-gallery-slider-title></strong>
            <span data-gallery-slider-caption></span>
          </figcaption>
        </figure>
        <button type="button" class="galeria-slider-nav" data-gallery-next aria-label="Próxima foto">→</button>
      </div>
    </div>
  </main>

  <footer class="site-footer" data-component="footer"></footer>

  <script src="js/site.js"></script>
</body>
</html>
